{% extends 'base.html' %}
{% block content %}

<div class="container py-5">
    <h2 class="mb-4 text-center">Get Your Diet Plan</h2>

    <form method="post" class="col-md-6 mx-auto">
        {% csrf_token %}

        <input type="text" name="name" class="form-control mb-3" placeholder="Name" required>

        <input type="text" name="dob" class="form-control mb-3" placeholder="Enter your DOB (YYYY-MM-DD)" required>

        <input type="number" name="height" class="form-control mb-3" placeholder="Height (cm)" required>

        <input type="number" step="0.1" name="weight" class="form-control mb-3" placeholder="Weight (kg)" required>

        <select name="goal" class="form-control mb-3">
            <option value="loss">Weight Loss</option>
            <option value="gain">Muscle Gain</option>
            <option value="maintain">Maintain</option>
        </select>

        <button class="btn btn-dark w-100">Get Diet Plan</button>
    </form>
</div>

{% endblock %}
