{% extends 'base.html' %}

{% block content %}

<div class="container py-5">
    <h2 class="text-center mb-4">Choose Payment Method</h2>

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">

                <button class="btn btn-outline-primary mb-3 w-100" onclick="paySuccess('UPI')">
                    💳 Pay with UPI
                </button>

                <button class="btn btn-outline-secondary mb-3 w-100" onclick="paySuccess('Card')">
                    💳 Credit / Debit Card
                </button>

                <button class="btn btn-outline-success w-100" onclick="paySuccess('Cash on Delivery')">
                    🚚 Cash on Delivery
                </button>

            </div>

            <div id="successMessage" class="alert alert-success text-center mt-4 d-none">
                Order placed ✅ <br>
                Thank you for your order!
            </div>

        </div>
    </div>
</div>

<script>
function paySuccess(method) {
    const msg = document.getElementById("successMessage");

    msg.classList.remove("d-none");
    msg.innerHTML = "Order placed Using " + method + " ✅ <br> Thank you for your order!";
}
</script>

{% endblock %}
